name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    strategy:
      matrix:
        api: [android8, android11]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('installers/android/apk/**/*.gradle.kts') }}

      - name: Install Python for Chaquopy
        run: sudo apt-get install -y python3

      - name: Build APK (${{ matrix.api }})
        working-directory: installers/android/apk
        run: |
          chmod +x gradlew
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew assemble${{ matrix.api == 'android8' && 'Android8' || 'Android11' }}Release --no-daemon
          else
            ./gradlew assemble${{ matrix.api == 'android8' && 'Android8' || 'Android11' }}Debug --no-daemon
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Orchestrator-${{ matrix.api }}
          path: installers/android/apk/app/build/outputs/apk/**/*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-apk
    runs-on: ubuntu-latest
    steps:
      - name: Download all APKs
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            AI-Orchestrator-android8/*.apk
            AI-Orchestrator-android11/*.apk
          generate_release_notes: true